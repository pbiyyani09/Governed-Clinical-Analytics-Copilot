repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.7.0, sqlglot>=25.0.0]
        args: [--ignore-missing-imports]

  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke
        entry: python -m pytest -m smoke -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-push]
